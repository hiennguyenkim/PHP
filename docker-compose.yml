services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library_web
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-mvc_app}
      DB_USER: ${DB_USER:-library_user}
      DB_PASS: ${DB_PASS:-library_pass}
    ports:
      - "${APP_PORT:-8080}:80"
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: library_db
    environment:
      MYSQL_DATABASE: ${DB_NAME:-mvc_app}
      MYSQL_USER: ${DB_USER:-library_user}
      MYSQL_PASSWORD: ${DB_PASS:-library_pass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./Project/database.sql:/docker-entrypoint-initdb.d/01-database.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  db_data:
